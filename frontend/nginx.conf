server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router uses client-side routing (BrowserRouter) — any path that
    # isn't a real static file (e.g. a direct load of /match/54 or a page
    # refresh there) must fall back to index.html so the router can take over,
    # otherwise nginx returns a 404 for anything but "/".
    location / {
        try_files $uri /index.html;
    }
}
